name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SPA
        run: bunx vite build --config vite.config.ts

      - name: Copy Cloudflare static config
        run: |
          cp _headers dist/_headers
          cp _redirects dist/_redirects

      - name: Debug secret presence
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then echo "API token present"; else echo "API token missing"; fi
          if [ -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then echo "Account ID present"; else echo "Account ID missing"; fi

      - name: Verify Wrangler auth
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler whoami

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler pages deploy dist --project-name=kpi-insights-hub --branch main
