name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SPA
        run: bunx vite build --config vite.config.ts

      - name: Copy Cloudflare static config
        run: |
          cp _headers dist/_headers
          cp _redirects dist/_redirects

      - name: Check if secrets exist
        run: |
          echo "TOKEN_PRESENT=${{ secrets.CLOUDFLARE_API_TOKEN != '' }}"
          echo "ACCOUNT_PRESENT=${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}"

      - name: Fail if secrets are missing
        run: |
          if [ "${{ secrets.CLOUDFLARE_API_TOKEN != '' }}" != "true" ]; then
            echo "CLOUDFLARE_API_TOKEN is missing"
            exit 1
          fi
          if [ "${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}" != "true" ]; then
            echo "CLOUDFLARE_ACCOUNT_ID is missing"
            exit 1
          fi

      - name: Show Wrangler version
        run: bunx wrangler --version

      - name: Verify Wrangler auth
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler whoami

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler pages deploy dist --project-name=kpi-insights-hub --branch main
