name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build SPA for Pages
        env:
          # Serve assets from the repo subpath on GitHub Pages
          VITE_BASE: /kpi-insights-hub/
        run: bunx vite build --config vite.config.pages.ts
      - name: Prepare static output
        run: |
          OUT=dist
          if [ ! -d "$OUT" ]; then
            echo "Expected $OUT after vite build." && exit 1
          fi
          # SPA fallback for client-side routing on GitHub Pages
          cp "$OUT/index.html" "$OUT/404.html"
          touch "$OUT/.nojekyll"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
